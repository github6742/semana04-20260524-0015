            <form action="" method="post" enctype="application/x-www-form-urlencoded">
                <fieldset>
                    <legend>Dejanos un mensaje!</legend>
                    
                        <label for="nombreyapellido">Nombre y Apellido</label>
                        <input type="text" name="nombreyapellido" id="">
                   
                 
                        <label for="correo">Correo electronico</label>
                        <input type="email" name="correo" id="">
                   
                
                        <label class="labelComment" for="comentario">Detalla tu comentario a continuacion</label>
                        <textarea name="comentario" id=""></textarea>
                 
                        <input type="submit" value="ENVIAR">
                
                </fieldset>
            </form>
        </main>

        <div class="imgContacto">
